name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" # Matches your local environment
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock flask google-generativeai google-cloud-storage firebase-admin python-dotenv
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run pytest
      run: |
        pytest test_main.py -v